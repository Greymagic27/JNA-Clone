on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 25
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '25'
          distribution: 'microsoft'
          cache: gradle

      - name: Build with Gradle
        run: gradle build
